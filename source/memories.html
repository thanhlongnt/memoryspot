<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/memories.css" />
    <link rel="stylesheet" href="styles/styles.css" />

    <link
      rel="icon"
      type="image/png"
      href="assets/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/apple-touch-icon.png"
    />
    <link rel="manifest" href="assets/site.webmanifest" />

    <!-- main script -->
    <script type="module" src="scripts/memories.js"></script>
    
    <!--modules-->
    <script type="module" src="./scripts/modules/cards.js"></script>
    <script type="module" src="scripts/modules/dataDisplay.js"></script>
    <script type="module" src="scripts/modules/dbFunctions.js"></script>

    <title>My Memories</title>
  </head>
  <body>
    <header>
      <a href="index.html" class="brand-link">
        <img src="assets/favicon-96x96.png" alt="MemorySpot Logo" />
        <h1>MemorySpot</h1>
      </a>
      <input type="checkbox" id="menu-toggle" class="menu-toggle" />
      <label for="menu-toggle" class="hamburger-menu">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
      </label>
      <nav>
        <a href="index.html">Home</a>
        <a href="memories.html">My Memories</a>
        <a href="create.html">Create</a>
      </nav>
    </header>

    <main id="memories">
      <memory-header>
        <h1>My Memories</h1>
        <memory-filters>
          <mood-filter>
            <select id="mood-search">
              <option selected>All Moods</option>
              <option>Nostalgic</option>
              <option>Happy</option>
              <option>Excited</option>
              <option>Sad</option>
              <option>Peaceful</option>
              <option>Neutral</option>
            </select>
          </mood-filter>
        </memory-filters>
      </memory-header>

      <!-- everything in memories-grid-container should be dynamically generated -->
      <memories-grid-container>
        <memories-grid> </memories-grid>
      </memories-grid-container>
    </main>
    <footer>
      <p>&copy; 2025 MemorySpot - BeeZee 24/7</p>
    </footer>
  </body>
</html>
